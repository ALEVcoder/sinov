{% extends 'base/base.html' %}
{% load static %}

{% block title %}Tangalarni yuborish - Admin Panel{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title">Tangalarni yuborish</h2>
    </div>
    <div class="card-body">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Yuborish</button>
        </form>
    </div>
</div>
{% endblock %}
